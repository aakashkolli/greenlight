name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build for GitHub Pages
        run: npm --workspace frontend run build:github-pages
        env:
          GITHUB_PAGES: true
          NEXT_PUBLIC_PRIVY_APP_ID: cmmvbtxlm00gk0ck1oj515c37
          # GITHUB_REPOSITORY is auto-provided by GitHub Actions
          # NEXT_PUBLIC_USE_MOCK_DATA is intentionally not set — DEMO_MODE defaults to true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
